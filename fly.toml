# fly.toml app configuration file generated for nodejs-argo on 2026-05-12T10:22:37Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nodejs-argo'
primary_region = 'nrt'

[http_service]
  auto_start_machines = true
  auto_stop_machines = true
  force_https = true
  internal_port = 3000
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '1gb'
  memory_mb = 256
